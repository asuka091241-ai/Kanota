<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;
  font-size:13px;
  -webkit-app-region:drag;
  background:transparent;
  overflow:hidden;
}
.win{
  margin:10px;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(20px);
  border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
  overflow:hidden;
}
.head{
  display:flex;align-items:center;gap:10px;
  padding:16px 18px 8px;
  -webkit-app-region:drag;
}
.head .logo{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#ea580c,#f59e0b);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:16px;font-weight:800;
  flex-shrink:0;
}
.head .title{
  font-size:14px;font-weight:700;
  color:rgba(0,0,0,0.85);
  flex:1;
}
.head .close-btn{
  width:24px;height:24px;border-radius:50%;
  border:none;background:rgba(0,0,0,0.06);
  color:rgba(0,0,0,0.45);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-app-region:no-drag;
  transition:background .15s;
}
.head .close-btn:hover{background:rgba(0,0,0,0.12);color:rgba(0,0,0,0.75)}

.body{padding:8px 18px 16px}
/* State: checking */
.spinner{
  width:36px;height:36px;margin:10px auto 8px;
  border:3px solid rgba(0,0,0,0.08);
  border-top-color:#f59e0b;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.status-text{text-align:center;font-size:13px;color:rgba(0,0,0,0.55);margin-bottom:4px}
.status-sub{text-align:center;font-size:11px;color:rgba(0,0,0,0.3)}

/* Version display */
.ver-display{display:flex;align-items:center;justify-content:center;gap:12px;margin:8px 0 6px}
.ver{text-align:center}
.ver .num{font-size:22px;font-weight:800;color:rgba(0,0,0,0.8)}
.ver .label{font-size:10px;color:rgba(0,0,0,0.35);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.ver.new .num{color:#ea580c}
.ver-arrow{font-size:18px;color:rgba(0,0,0,0.25)}

.notes-box{
  background:rgba(0,0,0,0.03);border-radius:8px;
  padding:10px 12px;margin:8px 0 4px;
  max-height:80px;overflow-y:auto;
  font-size:11px;line-height:1.6;color:rgba(0,0,0,0.5);white-space:pre-wrap;word-break:break-word;
}
.notes-box:empty{display:none}

/* Progress bar */
.progress-wrap{display:none;margin:12px 0 6px}
.progress-wrap.show{display:block}
.progress-track{
  height:6px;border-radius:3px;background:rgba(0,0,0,0.06);
  overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,#f59e0b,#ea580c);
  width:0%;transition:width .3s ease;
}
.progress-pct{text-align:right;font-size:10px;color:rgba(0,0,0,0.35);margin-top:4px}

/* Bottom actions */
.actions{display:flex;gap:8px;margin-top:12px}
.actions.right{justify-content:flex-end}
.btn{
  flex:1;padding:8px 16px;border-radius:8px;border:none;
  font-size:12.5px;font-weight:600;font-family:inherit;
  cursor:pointer;-webkit-app-region:no-drag;
  transition:all .15s;
}
.btn-primary{
  background:linear-gradient(135deg,#ea580c,#f59e0b);
  color:#fff;
}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-secondary{
  background:rgba(0,0,0,0.05);color:rgba(0,0,0,0.55);
}
.btn-secondary:hover{background:rgba(0,0,0,0.1);color:rgba(0,0,0,0.75)}

/* Up-to-date state */
.chk-icon{text-align:center;font-size:32px;margin:6px 0;color:#22c55e}

/* Error state */
.err-icon{text-align:center;font-size:28px;margin:6px 0;color:rgba(0,0,0,0.2)}

/* Focus mode */
body.focus .win{background:rgba(30,30,30,0.97)}
body.focus .head .title{color:rgba(255,255,255,0.85)}
body.focus .head .close-btn{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.45)}
body.focus .ver .num{color:rgba(255,255,255,0.8)}
body.focus .ver.new .num{color:#f59e0b}
body.focus .ver .label,.status-text,.status-sub{color:rgba(255,255,255,0.4)}
body.focus .ver-arrow{color:rgba(255,255,255,0.25)}
body.focus .notes-box{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.45)}
body.focus .progress-track{background:rgba(255,255,255,0.08)}
body.focus .btn-secondary{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.55)}
</style>
</head>
<body>
<div class="win">
  <div class="head">
    <div class="logo">K</div>
    <div class="title" id="title">软件更新</div>
    <button class="close-btn" id="btnClose">&times;</button>
  </div>
  <div class="body" id="body">
    <!-- Checking -->
    <div id="state-checking">
      <div class="spinner"></div>
      <div class="status-text">正在检查更新...</div>
      <div class="status-sub" id="subCurrent">当前 v1.0.0</div>
    </div>
    <!-- Has update -->
    <div id="state-update" style="display:none">
      <div class="ver-display">
        <div class="ver"><div class="num" id="verCur">1.0.3</div><div class="label">当前版本</div></div>
        <div class="ver-arrow">&#8594;</div>
        <div class="ver new"><div class="num" id="verNew">1.0.4</div><div class="label">新版本</div></div>
      </div>
      <div class="notes-box" id="notes"></div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-pct" id="progressPct">0%</div>
        <div class="status-text" id="progressStatus" style="margin-top:6px">正在下载...</div>
      </div>
      <div class="actions" id="actionsUpdate">
        <button class="btn btn-secondary" id="btnLater">稍后</button>
        <button class="btn btn-primary" id="btnUpdate">立即更新</button>
      </div>
    </div>
    <!-- Up to date -->
    <div id="state-uptodate" style="display:none">
      <div class="chk-icon">&#10003;</div>
      <div class="status-text">已是最新版本</div>
      <div class="status-sub">Kanota v<span id="verLatest">1.0.0</span></div>
      <div class="actions right">
        <button class="btn btn-primary" id="btnCloseOk" style="max-width:120px;margin:0 auto">好的</button>
      </div>
    </div>
    <!-- Error -->
    <div id="state-error" style="display:none">
      <div class="err-icon">&#9888;</div>
      <div class="status-text" id="errMsg">检查失败</div>
      <div class="status-sub">请检查网络连接后重试</div>
      <div class="actions">
        <button class="btn btn-secondary" id="btnErrClose">关闭</button>
        <button class="btn btn-primary" id="btnRetry">重试</button>
      </div>
    </div>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);

function showState(name) {
  ['state-checking','state-update','state-uptodate','state-error'].forEach(s => {
    $(s).style.display = s === name ? '' : 'none';
  });
}

// IPC listeners
window.updateAPI.onUpdateInfo((info) => {
  $('subCurrent').textContent = '当前 v' + info.currentVersion;
  $('verCur').textContent = 'v' + info.currentVersion;
  $('verNew').textContent = 'v' + info.latestVersion;
  $('notes').textContent = info.notes || '';
  showState('state-update');
});

window.updateAPI.onUpToDate((info) => {
  $('subCurrent').textContent = '当前 v' + info.currentVersion;
  $('verLatest').textContent = info.currentVersion;
  showState('state-uptodate');
});

window.updateAPI.onError((info) => {
  $('errMsg').textContent = info.message || '检查失败';
  showState('state-error');
});

window.updateAPI.onProgress((pct) => {
  $('progressWrap').classList.add('show');
  $('actionsUpdate').style.display = pct >= 100 ? 'none' : 'flex';
  $('progressFill').style.width = Math.max(0, pct) + '%';
  $('progressPct').textContent = Math.max(0, pct) + '%';
  if (pct >= 100) {
    $('progressStatus').textContent = '即将完成...';
    $('btnUpdate').textContent = '请稍候...';
    $('btnUpdate').disabled = true;
  }
});

window.updateAPI.onStatus((status) => {
  const map = { 'Downloading...': '正在下载...', 'Extracting...': '正在解压...', 'Preparing...': '正在准备...', 'Restarting...': '即将重启...' };
  $('progressStatus').textContent = map[status] || status;
});

// Buttons
$('btnClose').onclick = () => window.updateAPI.closeWindow();
$('btnCloseOk').onclick = () => window.updateAPI.closeWindow();
$('btnErrClose').onclick = () => window.updateAPI.closeWindow();
$('btnLater').onclick = () => window.updateAPI.closeWindow();
$('btnUpdate').onclick = () => window.updateAPI.startDownload();
$('btnRetry').onclick = () => { showState('state-checking'); window.updateAPI.retryCheck(); };
</script>
</body>
</html>
